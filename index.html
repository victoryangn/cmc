        // ============ Δa*-Δb* CMC 色差平面图组件 ============
        // 仪器风格布局（容差椭圆 + 样品点 + 方向标签 + ΔL* 辅助轴）+ 网站 slate/indigo 配色
        // 复用主组件 calc 的 da/db/dL/h_ab/SC/SH，无需新增计算
        const CMCPlaneChart = ({ calc, l, c, language }) => {
            // SVG 画布尺寸（viewBox 自动响应式缩放）
            const W = 560, H = 420;
            const padL = 46, padR = 108, padT = 36, padB = 46;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            const cx = padL + plotW / 2;   // 标准色（原点）像素 x
            const cy = padT + plotH / 2;   // 原点像素 y

            // 读取计算结果（h_ab 存为字符串，需转数值）
            const da = calc.da, db = calc.db, dL = calc.dL;
            const hDeg = Number(calc.h_ab) || 0;
            const hRad = hDeg * Math.PI / 180;
            const SC = calc.SC || 1, SH = calc.SH || 1;
            const zh = language === 'zh';

            // 视图范围（数据单位）：保证最外圈(2.0)椭圆与样品点均可见
            const ringC = 2.0 * c * Math.max(SC, 1e-4);  // 彩度方向最外圈半径
            const ringH = 2.0 * Math.max(SH, 1e-4);       // 色相方向最外圈半径
            const dataRange = Math.max(ringC * 1.25, ringH * 1.25, Math.abs(da) * 1.35, Math.abs(db) * 1.35, 0.6);
            const scale = Math.min(plotW, plotH) / (2 * dataRange); // 像素 / 数据单位

            // 数据坐标 → 像素（X 轴=Δb，Y 轴=Δa，+a 朝上需翻转 y）
            const px = (ddb, dda) => [cx + ddb * scale, cy - dda * scale];

            // 生成 ΔE_CMC=t 的容差椭圆 path（标准色色相角 h_ab 为旋转角）
            // (ΔC,ΔH) → (Δa,Δb) 逆旋转：Δa = ΔC·cos h − ΔH·sin h；Δb = ΔC·sin h + ΔH·cos h
            const ellipsePath = (t) => {
                const aC = Math.max(t * c * SC, 1e-4); // ΔC 方向半轴
                const aH = Math.max(t * SH, 1e-4);      // ΔH 方向半轴
                const N = 72, pts = [];
                for (let i = 0; i <= N; i++) {
                    const th = (i / N) * 2 * Math.PI;
                    const dCk = aC * Math.cos(th);
                    const dHk = aH * Math.sin(th);
                    const dda = dCk * Math.cos(hRad) - dHk * Math.sin(hRad);
                    const ddb = dCk * Math.sin(hRad) + dHk * Math.cos(hRad);
                    const [X, Y] = px(ddb, dda);
                    pts.push(`${i === 0 ? 'M' : 'L'}${X.toFixed(2)},${Y.toFixed(2)}`);
                }
                return pts.join(' ') + ' Z';
            };

            // ΔL* 辅助轴（右侧竖直数轴）
            const Lrange = Math.max(Math.abs(dL) * 1.6, 0.6);
            const Lscale = (plotH / 2) / Lrange;
            const Lx = padL + plotW + 64;
            const Ly = (v) => cy - v * Lscale;

            // 网格刻度（自适应 nice step）
            const niceStep = (r) => {
                const raw = r / 3;
                const mag = Math.pow(10, Math.floor(Math.log10(raw)));
                const n = raw / mag;
                return (n >= 5 ? 5 : n >= 2 ? 2 : 1) * mag;
            };
            const step = niceStep(dataRange);
            const ticks = [];
            for (let v = -Math.ceil(dataRange / step) * step; v <= dataRange + 1e-9; v += step) {
                if (Math.abs(v) < 1e-9) continue;
                ticks.push(Number(v.toFixed(4)));
            }

            const rings = [0.5, 1.0, 1.5, 2.0];
            const [sx, sy] = px(db, da);
            const sampleColor = calc.isPass ? '#10b981' : '#f43f5e';
            const lColor = dL >= 0 ? '#f59e0b' : '#6366f1';   // ΔL* 辅助轴样品点配色（偏浅琥珀 / 偏深靛蓝）
            // 1.0 合格线标签放在 +ΔC 方向端点（彩度方向）
            const [labX, labY] = px(c * SC * Math.sin(hRad), c * SC * Math.cos(hRad));

            return (
                <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" style={{ maxHeight: 440 }} fontFamily="system-ui, -apple-system, sans-serif">
                    {/* 图标题 */}
                    <text x={padL} y={20} fontSize={12} fontWeight={800} fill="#334155">色差平面 CMC({l}:{c}) D65/10°</text>
                    <text x={W - padR} y={20} fontSize={8.5} fill="#94a3b8" textAnchor="end">{zh ? '椭圆 = CMC 等色差线，实线为合格边界 (ΔE=1.0)' : 'Ellipses = CMC tolerance, solid = pass (ΔE=1.0)'}</text>

                    {/* 主图背景 */}
                    <rect x={padL} y={padT} width={plotW} height={plotH} fill="#ffffff" stroke="#e2e8f0" strokeWidth={1} rx={8} />

                    {/* 网格线 */}
                    {ticks.map((v, i) => {
                        const [xv] = px(v, 0); const [, yv] = px(0, v);
                        return (
                            <g key={'g' + i} stroke="#f1f5f9" strokeWidth={1}>
                                <path d={`M${xv} ${padT}L${xv} ${padT + plotH}`} fill="none" />
                                <path d={`M${padL} ${yv}L${padL + plotW} ${yv}`} fill="none" />
                            </g>
                        );
                    })}

                    {/* 中心十字轴 */}
                    <line x1={padL} y1={cy} x2={padL + plotW} y2={cy} stroke="#94a3b8" strokeWidth={1.2} />
                    <line x1={cx} y1={padT} x2={cx} y2={padT + plotH} stroke="#94a3b8" strokeWidth={1.2} />

                    {/* 容差椭圆：外圈虚线 + 1.0 合格线高亮 */}
                    {rings.filter(t => t !== 1.0).map(t => (
                        <path key={'r' + t} d={ellipsePath(t)} fill="none" stroke="#cbd5e1" strokeWidth={1} strokeDasharray="4 3" />
                    ))}
                    <path d={ellipsePath(1.0)} fill="rgba(99,102,241,0.08)" stroke="#6366f1" strokeWidth={2} />
                    <text x={labX + 4} y={labY - 4} fontSize={9} fill="#6366f1" fontWeight={700}>ΔE=1.0</text>

                    {/* 方向标签：+a*(红)/-a*(绿)/+b*(黄)/-b*(蓝) */}
                    <text x={cx + 6} y={padT + 12} fontSize={11} fill="#ef4444" fontWeight={700}>+a* {zh ? '红' : ''}</text>
                    <text x={cx + 6} y={padT + plotH - 6} fontSize={11} fill="#22c55e" fontWeight={700}>−a* {zh ? '绿' : ''}</text>
                    <text x={padL + plotW - 8} y={cy - 6} fontSize={11} fill="#f59e0b" fontWeight={700} textAnchor="end">+b* {zh ? '黄' : ''}</text>
                    <text x={padL + 8} y={cy - 6} fontSize={11} fill="#3b82f6" fontWeight={700}>−b* {zh ? '蓝' : ''}</text>

                    {/* 轴标题 */}
                    <text x={padL + plotW + 6} y={cy + 14} fontSize={10} fill="#64748b" fontWeight={600}>Δb*</text>
                    <text x={cx - 26} y={padT - 8} fontSize={10} fill="#64748b" fontWeight={600}>Δa*</text>

                    {/* 标准色原点 */}
                    <circle cx={cx} cy={cy} r={5} fill="none" stroke="#1e293b" strokeWidth={2} />
                    <circle cx={cx} cy={cy} r={1.5} fill="#1e293b" />
                    <text x={cx + 8} y={cy + 14} fontSize={9} fill="#64748b">{zh ? '标准' : 'Std'}</text>

                    {/* 样品点 + 悬停提示 + ΔE 标签 */}
                    <circle cx={sx} cy={sy} r={7} fill={sampleColor} stroke="#ffffff" strokeWidth={2}>
                        <title>{`Δa* = ${da.toFixed(3)}\nΔb* = ${db.toFixed(3)}\nΔL* = ${dL.toFixed(3)}\nΔE_CMC = ${calc.dE_cmc.toFixed(3)}\n${calc.isPass ? (zh ? '合格' : 'PASS') : (zh ? '不合格' : 'FAIL')}`}</title>
                    </circle>
                    <text x={sx + 10} y={sy - 8} fontSize={10} fontWeight={700} fill={sampleColor}>ΔE {calc.dE_cmc.toFixed(2)}</text>
                    <text x={sx + 10} y={sy + 12} fontSize={9} fill="#475569">{zh ? '样品' : 'Sample'}</text>

                    {/* 右侧 ΔL* 辅助轴 */}
                    <text x={Lx - 10} y={padT - 8} fontSize={10} fill="#64748b" fontWeight={600}>ΔL*</text>
                    <line x1={Lx} y1={padT} x2={Lx} y2={padT + plotH} stroke="#94a3b8" strokeWidth={1.2} />
                    {[0, Lrange / 2, -Lrange / 2].map((v, i) => (
                        <g key={'L' + i}>
                            <path d={"M" + (Lx - 4) + " " + Ly(v) + "L" + (Lx + 4) + " " + Ly(v)} stroke="#94a3b8" strokeWidth={1} fill="none" />
                            <text x={Lx + 7} y={Ly(v) + 3} fontSize={8} fill="#94a3b8">{v.toFixed(1)}</text>
                        </g>
                    ))}
                    <circle cx={Lx} cy={Ly(dL)} r={6} fill={lColor} stroke="#fff" strokeWidth={2}>
                        <title>{`ΔL* = ${dL.toFixed(3)} (${dL > 0 ? (zh ? '偏浅' : 'Lighter') : (zh ? '偏深' : 'Darker')})`}</title>
                    </circle>
                    <text x={Lx + 7} y={Ly(dL) + 3} fontSize={8} fontWeight={700} fill={lColor}>{dL.toFixed(2)}</text>
                </svg>
            );
        };

        const App = () => {
            const [l, setL] = useState(2.0);
            const [c, setC] = useState(1.0);
            const [history, setHistory] = useState([]);
            const [message, setMessage] = useState("");
            const [inputMode, setInputMode] = useState('LAB'); // 'LAB' 或 'LCH'
            const [language, setLanguage] = useState('zh'); // 'zh' 或 'en'
            // 获取当前日期 YYYY-MM-DD 格式
            const today = new Date().toISOString().slice(0, 10);
            const [currentInput, setCurrentInput] = useState({
                // 基本信息

                factory: '', // 生产工厂
                productName: '',
                colorName: '黑色',

                note: '', // 标准备注
                // LAB 值
                stdL: 50.00, stdA: 10.00, stdB: 15.00,
                smplL: 51.20, smplA: 10.50, smplB: 14.20,
                // LCH 值
                stdL_lch: 50.00, stdC: 18.03, stdH: 56.31,
                smplL_lch: 51.20, smplC: 17.69, smplH: 53.49,
            });

            const fileInputRef = useRef(null);
            const [dataFileName, setDataFileName] = useState('CMC_Data.json'); // 默认数据文件名
            const [showDropZone, setShowDropZone] = useState(false);
            const [fileHandle, setFileHandle] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            
            // 标准库状态
            const [standards, setStandards] = useState([]);
            const [standardsFileHandle, setStandardsFileHandle] = useState(null);
            const [standardsFileName, setStandardsFileName] = useState("");
            const [isStandardsConnected, setIsStandardsConnected] = useState(false);

            // 标准选择器状态
            const [showStandardSelector, setShowStandardSelector] = useState(false);
            const [standardSearchTerm, setStandardSearchTerm] = useState('');

            // 历史记录搜索状态
            const [historySearchTerm, setHistorySearchTerm] = useState('');

            // 展开行状态
            const [expandedRows, setExpandedRows] = useState(new Set());

            // 切换展开函数
            const toggleRow = (id) => {
                const newExpanded = new Set(expandedRows);
                if (newExpanded.has(id)) {
                    newExpanded.delete(id);
                } else {
                    newExpanded.add(id);
                }
                setExpandedRows(newExpanded);
            };

            // 输入验证错误状态
            const [validationErrors, setValidationErrors] = useState([]);

            // 保存加载状态
            const [isSaving, setIsSaving] = useState(false);

            // 翻译辅助函数
            const t = (key) => translations[language][key] || key;

            // 安全数值解析：处理中间输入状态（如 "-", ".", "-."）
            const numVal = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

            // 提取历史录入建议 (从 history 和 standards 中获取唯一值)
            const suggestions = useMemo(() => {
                const allItems = [...history, ...standards];
                const getUnique = (key) => [...new Set(allItems.map(item => item[key]).filter(Boolean))].sort();
                return {
                    countries: getUnique('country'),
                    factories: getUnique('factory'),
                    productNames: getUnique('productName'),
                    colorNames: getUnique('colorName'),
                    notes: getUnique('note'),
                };
            }, [history, standards]);

            // 历史记录搜索过滤
            const filteredHistory = useMemo(() => {
                if (!historySearchTerm) return history;
                const term = historySearchTerm.toLowerCase();
                return history.filter(item =>
                    (item.productName || '').toLowerCase().includes(term) ||
                    (item.colorName || '').toLowerCase().includes(term) ||
                    (item.country || '').toLowerCase().includes(term) ||
                    (item.factory || '').toLowerCase().includes(term)
                );
            }, [history, historySearchTerm]);

            // LAB ↔ LCH 转换函数
            const labToLch = (L, a, b) => {
                const C = Math.sqrt(a * a + b * b);
                let H = Math.atan2(b, a) * (180 / Math.PI);
                if (H < 0) H += 360;
                return { L, C, H: H.toFixed(2) };
            };

            const lchToLab = (L, C, H) => {
                const H_rad = H * (Math.PI / 180);
                const a = C * Math.cos(H_rad);
                const b = C * Math.sin(H_rad);
                return { L, a, b };
            };

            // 输入验证函数
            const validateLAB = (L, a, b) => {
                const errors = [];
                if (isNaN(L) || L < 0 || L > 100) errors.push('L* 值必须在 0-100 之间');
                if (isNaN(a) || a < -128 || a > 127) errors.push('a* 值必须在 -128 到 127 之间');
                if (isNaN(b) || b < -128 || b > 127) errors.push('b* 值必须在 -128 到 127 之间');
                return errors;
            };

            const validateLCH = (L, C, H) => {
                const errors = [];
                if (isNaN(L) || L < 0 || L > 100) errors.push('L* 值必须在 0-100 之间');
                if (isNaN(C) || C < 0) errors.push('C* 值不能为负数');
                if (isNaN(H) || H < 0 || H >= 360) errors.push('H° 值必须在 0-359 之间');
                return errors;
            };

            // 初始化：从 localStorage 读取数据，并尝试恢复文件连接
            useEffect(() => {
                const savedHistory = localStorage.getItem('cmc_history');
                const savedWeights = localStorage.getItem('cmc_weights');
                const savedStandards = localStorage.getItem('cmc_standards');
                
                if (savedHistory) {
                    try {
                        setHistory(JSON.parse(savedHistory));
                    } catch (e) {
                        console.error("读取历史记录失败");
                    }
                }
                if (savedWeights) {
                    try {
                        const { savedL, savedC } = JSON.parse(savedWeights);
                        setL(savedL);
                        setC(savedC);
                    } catch (e) {}
                }
                if (savedStandards) {
                    try {
                        setStandards(JSON.parse(savedStandards));
                    } catch (e) {}
                }
            }, []);

            // 连接本地数据文件
            const connectDataFile = async () => {
                if (!('showOpenFilePicker' in window)) {
                    showMsg("您的浏览器不支持本地文件访问，请使用 Chrome 或 Edge");
                    return;
                }

                try {
                    // 使用 showOpenFilePicker 打开现有文件
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'JSON 数据文件',
                            accept: { 'application/json': ['.json'] }
                        }],
                        multiple: false
                    });

                    // 尝试读取文件内容
                    try {
                        const file = await handle.getFile();
                        const text = await file.text();
                        const data = JSON.parse(text);
                        if (Array.isArray(data)) {
                            setHistory(data);
                            showMsg(`✓ 已加载 ${data.length} 条记录`);
                        }
                    } catch (e) {
                        console.log("读取文件失败或格式错误", e);
                        if (!confirm("文件似乎为空或格式不正确，是否仍要连接并覆盖它？")) {
                            return;
                        }
                    }

                    setFileHandle(handle);
                    setIsConnected(true);
                    setDataFileName(handle.name);
                    showMsg(`✓ 已连接：${handle.name}`);
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error("连接文件失败", e);
                        showMsg("连接失败: " + e.message);
                    }
                }
            };

            // 直接写入本地文件
            const writeToFile = async (data) => {
                if (!fileHandle) return false;

                try {
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();
                    return true;
                } catch (e) {
                    console.error("写入文件失败", e);
                    setIsConnected(false);
                    setFileHandle(null);
                    showMsg("文件连接断开，请重新连接");
                    return false;
                }
            };

            // 拖放加载 JSON 文件
            const handleDrop = (e) => {
                e.preventDefault();
                setShowDropZone(false);
                const file = e.dataTransfer.files[0];
                if (file && file.name.endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (Array.isArray(data)) {
                                setHistory(data);
                                setDataFileName(file.name);
                                showMsg(`✓ 已加载数据文件：${file.name}`);
                            }
                        } catch (err) {
                            showMsg("文件格式错误");
                        }
                    };
                    reader.readAsText(file);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setShowDropZone(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setShowDropZone(false);
            };

            // 监听数据变化并自动保存到浏览器本地（不包括本地文件，避免重复）
            useEffect(() => {
                localStorage.setItem('cmc_history', JSON.stringify(history));
            }, [history]);

            useEffect(() => {
                localStorage.setItem('cmc_weights', JSON.stringify({ savedL: l, savedC: c }));
            }, [l, c]);

            useEffect(() => {
                localStorage.setItem('cmc_standards', JSON.stringify(standards));
            }, [standards]);

            // ESC 键关闭弹出式选择器
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && showStandardSelector) {
                        setShowStandardSelector(false);
                        setStandardSearchTerm('');
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showStandardSelector]);

            // 连接标准库文件
            const connectStandardsFile = async () => {
                if (!('showOpenFilePicker' in window)) {
                    showMsg("您的浏览器不支持本地文件访问");
                    return;
                }
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{ description: 'JSON 标准库文件', accept: { 'application/json': ['.json'] } }],
                        multiple: false
                    });
                    const file = await handle.getFile();
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if (Array.isArray(data)) {
                        setStandards(data);
                        setStandardsFileHandle(handle);
                        setStandardsFileName(file.name);
                        setIsStandardsConnected(true);
                        showMsg(`✓ 已连接标准库：${file.name}`);
                    } else {
                        showMsg("文件格式不正确（非数组）");
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error(e);
                        showMsg("连接失败: " + e.message);
                    }
                }
            };

            // 写入标准库文件 (保留 JSON 逻辑用于兼容，但主要功能改为 CSV)
            const writeStandardsToFile = async (data, handle = standardsFileHandle) => {
                if (!handle) return false;
                try {
                    const writable = await handle.createWritable();
                    await writable.write(JSON.stringify(data, null, 2));
                    await writable.close();
                    return true;
                } catch (e) {
                    console.error(e);
                    showMsg("写入标准库失败");
                    return false;
                }
            };

            // 标准库操作
            const saveStandard = async () => {
                const note = currentInput.note || "";

                const newStandard = {
                    id: Date.now().toString(),
                    timestamp: Date.now(),
                    country: currentInput.country || "",
                    factory: currentInput.factory || "",
                    productName: currentInput.productName || "未命名产品",
                    colorName: currentInput.colorName || "未命名颜色",
                    tolerance: numVal(currentInput.tolerance) || 1.0,
                    note: note,
                    mode: inputMode,
                    data: inputMode === 'LAB'
                        ? { L: numVal(currentInput.stdL), a: numVal(currentInput.stdA), b: numVal(currentInput.stdB) }
                        : { L: numVal(currentInput.stdL_lch), C: numVal(currentInput.stdC), H: numVal(currentInput.stdH) }
                };

                // 更新 React 状态和本地存储（仅作为缓存）
                const newStandards = [newStandard, ...standards];
                setStandards(newStandards);
                localStorage.setItem('cmc_standards', JSON.stringify(newStandards));

                // 强制另存为 CSV 文件
                const dateStr = new Date().toISOString().slice(0,10);
                const defaultName = `${currentInput.country||'Standard'}_${currentInput.productName}_${currentInput.colorName}_${dateStr}.csv`;
                
                // 准备 CSV 内容
                // BOM for Excel UTF-8 compatibility
                let csvContent = "\uFEFF";
                // Header
                csvContent += "ID,日期,国家,工厂,产品名称,颜色名称,模式,备注,标准L,标准A/C,标准B/H,容差(ΔE)\n";
                // Data Row
                const stdL = inputMode === 'LAB' ? numVal(currentInput.stdL) : numVal(currentInput.stdL_lch);
                const stdA_C = inputMode === 'LAB' ? numVal(currentInput.stdA) : numVal(currentInput.stdC);
                const stdB_H = inputMode === 'LAB' ? numVal(currentInput.stdB) : numVal(currentInput.stdH);
                
                csvContent += `${newStandard.id},${dateStr},${newStandard.country},${newStandard.factory},${newStandard.productName},${newStandard.colorName},${inputMode},"${note.replace(/"/g, '""')}",${stdL},${stdA_C},${stdB_H},${newStandard.tolerance}\n`;

                if ('showSaveFilePicker' in window) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: defaultName,
                            types: [{ description: 'CSV 数据文件', accept: { 'text/csv': ['.csv'] } }]
                        });
                        const writable = await handle.createWritable();
                        await writable.write(csvContent);
                        await writable.close();
                        showMsg(`✓ 标准已保存为 CSV 文件：${handle.name}`);
                    } catch (e) {
                        // 用户取消
                        if (e.name !== 'AbortError') {
                            console.error(e);
                            showMsg("保存 CSV 失败");
                        }
                    }
                } else {
                    // 降级方案：直接下载
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = defaultName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                    showMsg(`✓ 标准已下载为 CSV：${defaultName}`);
                }
            };

            const loadStandard = (std) => {
                if (std.mode !== inputMode) {
                    if (!confirm(`该标准是 ${std.mode} 模式录入的，当前是 ${inputMode} 模式。\n是否切换到 ${std.mode} 模式并加载？`)) {
                        return;
                    }
                    setInputMode(std.mode);
                }

                const newInput = { ...currentInput };
                newInput.country = std.country || newInput.country;
                newInput.factory = std.factory || newInput.factory;
                newInput.productName = std.productName;
                newInput.colorName = std.colorName;
                newInput.tolerance = std.tolerance || 1.0;
                newInput.note = std.note || "";
                
                if (std.mode === 'LAB') {
                    newInput.stdL = std.data.L;
                    newInput.stdA = std.data.a;
                    newInput.stdB = std.data.b;
                } else {
                    newInput.stdL_lch = std.data.L;
                    newInput.stdC = std.data.C;
                    newInput.stdH = std.data.H;
                }
                
                setCurrentInput(newInput);
                showMsg(`✓ 已加载标准：${std.productName} - ${std.colorName}`);
            };

            const deleteStandard = (id) => {
                if (confirm("确定要删除这条标准吗？")) {
                    setStandards(standards.filter(s => s.id !== id));
                    showMsg("标准已删除");
                }
            };

            const loadHistory = (item) => {
                 // 优先切换输入模式，确保 UI 显示一致
                 if (item.inputMode && item.inputMode !== inputMode) {
                     setInputMode(item.inputMode);
                 }
                 
                 // 构建新的输入状态
                 const newInput = {
                     ...currentInput,
                     country: item.country || "",
                     factory: item.factory || "",
                     productName: item.productName || "",
                     colorName: item.colorName || "",
                     name: item.name || "",
                     tolerance: item.tolerance || 1.0,
                     note: item.note || "",
                     // 加载 LAB 值 (使用记录值，如果没有则保持当前)
                     stdL: item.stdL ?? currentInput.stdL,
                     stdA: item.stdA ?? currentInput.stdA,
                     stdB: item.stdB ?? currentInput.stdB,
                     smplL: item.smplL ?? currentInput.smplL,
                     smplA: item.smplA ?? currentInput.smplA,
                     smplB: item.smplB ?? currentInput.smplB,
                     // 加载 LCH 值
                     stdL_lch: item.stdL_lch ?? currentInput.stdL_lch,
                     stdC: item.stdC ?? currentInput.stdC,
                     stdH: item.stdH ?? currentInput.stdH,
                     smplL_lch: item.smplL_lch ?? currentInput.smplL_lch,
                     smplC: item.smplC ?? currentInput.smplC,
                     smplH: item.smplH ?? currentInput.smplH,
                 };
                 
                 setCurrentInput(newInput);
                 showMsg(`✓ 已载入历史数据：${item.productName || '未命名'}`);
             };

            // 核心计算逻辑
            const calc = useMemo(() => {
                // 输入验证
                let errors = [];
                if (inputMode === 'LCH') {
                    errors = [
                        ...validateLCH(numVal(currentInput.stdL_lch), numVal(currentInput.stdC), numVal(currentInput.stdH)),
                        ...validateLCH(numVal(currentInput.smplL_lch), numVal(currentInput.smplC), numVal(currentInput.smplH))
                    ];
                } else {
                    errors = [
                        ...validateLAB(numVal(currentInput.stdL), numVal(currentInput.stdA), numVal(currentInput.stdB)),
                        ...validateLAB(numVal(currentInput.smplL), numVal(currentInput.smplA), numVal(currentInput.smplB))
                    ];
                }
                setValidationErrors(errors);

                // 如果有验证错误，返回默认值
                if (errors.length > 0) {
                    return {
                        dL: 0, da: 0, db: 0, dC: 0, dH: 0, h_ab: 0, stdA: 0, stdB: 0, smplA: 0, smplB: 0, SL: 1, SC: 1, SH: 1, T: 0, F: 0,
                        dE_cmc: 0, isPass: false, tolerance: numVal(currentInput.tolerance) || 1.0,
                        diagnosticReport: {
                            conclusion: "输入值有误",
                            primaryIssue: "数据验证失败",
                            suggestions: errors.map(e => `• ${e}`)
                        },
                        components: []
                    };
                }

                // 根据输入模式获取 LAB 值
                let stdL, stdA, stdB, smplL, smplA, smplB;
                if (inputMode === 'LCH') {
                    // 从 LCH 转换为 LAB
                    const stdLab = lchToLab(numVal(currentInput.stdL_lch), numVal(currentInput.stdC), numVal(currentInput.stdH));
                    const smplLab = lchToLab(numVal(currentInput.smplL_lch), numVal(currentInput.smplC), numVal(currentInput.smplH));
                    stdL = stdLab.L; stdA = stdLab.a; stdB = stdLab.b;
                    smplL = smplLab.L; smplA = smplLab.a; smplB = smplLab.b;
                } else {
                    // 直接使用 LAB 值
                    stdL = numVal(currentInput.stdL); stdA = numVal(currentInput.stdA); stdB = numVal(currentInput.stdB);
                    smplL = numVal(currentInput.smplL); smplA = numVal(currentInput.smplA); smplB = numVal(currentInput.smplB);
                }
                const dL = smplL - stdL;
                const da = smplA - stdA;
                const db = smplB - stdB;
                const C_std = Math.sqrt(stdA**2 + stdB**2);
                const C_smpl = Math.sqrt(smplA**2 + smplB**2);
                const dC = C_smpl - C_std;
                const dH_sq = da**2 + db**2 - dC**2;
                const dH = Math.sqrt(Math.max(0, dH_sq));
                let h_ab = Math.atan2(stdB, stdA) * (180 / Math.PI);
                if (h_ab < 0) h_ab += 360;

                const SL = stdL < 16 ? 0.511 : (0.040975 * stdL) / (1 + 0.01765 * stdL);
                const SC = (0.0638 * C_std) / (1 + 0.0131 * C_std) + 0.638;
                const F = Math.sqrt(Math.pow(C_std, 4) / (Math.pow(C_std, 4) + 1900));
                const T = (h_ab >= 164 && h_ab <= 345) 
                    ? 0.56 + Math.abs(0.2 * Math.cos(((h_ab + 168) * Math.PI) / 180))
                    : 0.36 + Math.abs(0.4 * Math.cos(((h_ab + 35) * Math.PI) / 180));
                const SH = SC * (F * T + 1 - F);

                const contribL = Math.pow(dL / (l * SL), 2);
                const contribC = Math.pow(dC / (c * SC), 2);
                const contribH = Math.pow(dH / SH, 2);
                const dE_cmc = Math.sqrt(contribL + contribC + contribH);
                
                // 判定结果
                const tolerance = numVal(currentInput.tolerance) || 1.0;
                const isPass = dE_cmc <= tolerance;

                // 四方向调整建议阈值（对齐 Excel ±0.15）
                const ADJ_TH = 0.15;
                const components = [
                    {
                        id: 'L',
                        label: '明度(L*)',
                        contrib: contribL,
                        diff: dL,
                        status: dL > ADJ_TH ? "偏浅" : dL < -ADJ_TH ? "偏深" : "接近",
                        direction: dL > ADJ_TH ? "明度过高" : dL < -ADJ_TH ? "明度不足" : "明度达标",
                        action: dL > ADJ_TH ? "应调暗：减少白粉/白料，或增加主色浓度"
                            : dL < -ADJ_TH ? "应调亮：降低主色浓度，或添加冲淡剂/钛白粉"
                            : "明度接近标准，无需调整"
                    },
                    {
                        id: 'C',
                        label: '彩度(C*)',
                        contrib: contribC,
                        diff: dC,
                        status: dC > ADJ_TH ? "偏鲜艳" : dC < -ADJ_TH ? "偏灰暗" : "接近",
                        direction: dC > ADJ_TH ? "饱和度过高" : dC < -ADJ_TH ? "饱和度不足" : "彩度达标",
                        action: dC > ADJ_TH ? "应调灰：添加极微量补色/对色进行消色"
                            : dC < -ADJ_TH ? "应提彩：增加高纯度主色比例，减少灰色组分"
                            : "彩度接近标准，无需调整"
                    },
                    {
                        id: 'H',
                        label: '色相(H*)',
                        contrib: contribH,
                        diff: dH,
                        status: dH > ADJ_TH ? "偏移" : "接近",
                        direction: dH > ADJ_TH ? "色相角度偏差" : "色相达标",
                        action: dH > ADJ_TH ? "【微调】根据色相环，向目标方向追加对应色相的染料/颜料" : "色相接近标准，无需调整"
                    },
                    {
                        id: 'a',
                        label: '红绿(a*)',
                        contrib: da * da,
                        diff: da,
                        status: da > ADJ_TH ? "偏红" : da < -ADJ_TH ? "偏绿" : "接近",
                        direction: da > ADJ_TH ? "偏红" : da < -ADJ_TH ? "偏绿" : "红绿达标",
                        action: da > ADJ_TH ? "应减红 / 增绿"
                            : da < -ADJ_TH ? "应增红 / 减绿"
                            : "红绿向接近标准，无需调整"
                    },
                    {
                        id: 'b',
                        label: '黄蓝(b*)',
                        contrib: db * db,
                        diff: db,
                        status: db > ADJ_TH ? "偏黄" : db < -ADJ_TH ? "偏蓝" : "接近",
                        direction: db > ADJ_TH ? "偏黄" : db < -ADJ_TH ? "偏蓝" : "黄蓝达标",
                        action: db > ADJ_TH ? "应减黄 / 增蓝"
                            : db < -ADJ_TH ? "应增黄 / 减蓝"
                            : "黄蓝向接近标准，无需调整"
                    }
                ].sort((a, b) => b.contrib - a.contrib);

                // 生成深度报告建议（按主因方向给出）
                let diagnosticReport = {
                    conclusion: isPass ? "符合标准要求" : "超出容差范围",
                    primaryIssue: components[0].label + components[0].status,
                    suggestions: []
                };

                // 综合建议逻辑（按主因方向给出）
                if (!isPass) {
                    const top = components[0];
                    if (top.id === 'L') {
                        diagnosticReport.suggestions.push(dL > 0
                            ? "明度显著偏浅（偏亮）：优先增加色精/色粉浓度，检查白料是否过量。"
                            : "明度显著偏深（偏暗）：建议稀释主色浓度，或适当增加钛白粉/透明底料。");
                    } else if (top.id === 'C') {
                        diagnosticReport.suggestions.push(dC > 0
                            ? "彩度偏高（偏鲜艳）：添加微量补色/对色进行消色，向标准靠拢。"

                // 批次样块
                qtxContent += "=========================== BATCH SAMPLE ============================\n";
                const batchDate = new Date(record.timestamp).toISOString().slice(0, 19).replace('T', ' ');

                qtxContent += `Batch ID         : ${record.id}\n`;
                qtxContent += `Test Date/Time   : ${batchDate}\n`;
                qtxContent += "=======================================================================\n";
                qtxContent += "Measured Values (LAB Color Space):\n";
                qtxContent += `  L* (Lightness) : ${smplL.toFixed(3)}\n`;
                qtxContent += `  a* (Red-Green) : ${finalSmplA.toFixed(3)}\n`;
                qtxContent += `  b* (Yellow-Blue): ${finalSmplB.toFixed(3)}\n`;

                // 计算彩度和色相角
                const smplC_val = Math.sqrt(finalSmplA ** 2 + finalSmplB ** 2);
                let smplH_val = Math.atan2(finalSmplB, finalSmplA) * (180 / Math.PI);
                if (smplH_val < 0) smplH_val += 360;
                qtxContent += `  C* (Chroma)    : ${smplC_val.toFixed(3)}\n`;
                qtxContent += `  H° (Hue Angle) : ${smplH_val.toFixed(2)}°\n`;
                qtxContent += "=======================================================================\n";

                // 色差计算结果
                const dL = smplL - stdL;
                const da = finalSmplA - finalStdA;
                const db = finalSmplB - finalStdB;
                const dC = smplC_val - stdC_val;
                let dH = smplH_val - stdH_val;
                if (dH > 180) dH -= 360;
                if (dH < -180) dH += 360;

                qtxContent += "Color Difference (Delta Values):\n";
                qtxContent += `  ΔL*             : ${dL >= 0 ? '+' : ''}${dL.toFixed(3)}\n`;
                qtxContent += `  Δa*             : ${da >= 0 ? '+' : ''}${da.toFixed(3)}\n`;
                qtxContent += `  Δb*             : ${db >= 0 ? '+' : ''}${db.toFixed(3)}\n`;
                qtxContent += `  ΔC*             : ${dC >= 0 ? '+' : ''}${dC.toFixed(3)}\n`;
                qtxContent += `  ΔH°             : ${dH >= 0 ? '+' : ''}${dH.toFixed(2)}°\n`;
                qtxContent += "=======================================================================\n";
                qtxContent += `CMC({l}:{c}) ΔE    : ${record.dE.toFixed(3)}\n`;
                qtxContent += `Result           : ${record.isPass ? 'PASS (合格)' : 'FAIL (不合格)'}\n`;
                qtxContent += `Tolerance        : ≤ ${record.tolerance || 1.0}\n`;
                qtxContent += "=======================================================================\n\n";

                // 文件尾
                qtxContent += "****************************************************************************\n";
                qtxContent += "* END OF QTX FILE\n";
                qtxContent += "* Single Record Export\n";
                qtxContent += "* Record ID: " + record.id + "\n";
                qtxContent += "****************************************************************************\n";

                // 生成文件名
                const safeProductName = (productName || 'Product').replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_');
                const safeColorName = (colorName || 'Color').replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_');
                const fileName = `QTX_${safeProductName}_${safeColorName}_${record.id}.qtx`;

                // 直接下载
                const blob = new Blob([qtxContent], { type: "text/plain;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showMsg(`✓ 已导出单条记录 QTX: ${record.id}`);
            };

            // 导入数据
            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            setHistory(imported);
                            showMsg("导入成功");
                        }
                    } catch (err) {
                        showMsg("文件格式错误，导入失败");
                    }
                };
                reader.readAsText(file);
            };

            const clearHistory = async () => {
                if (history.length === 0) return;

                    : "确定要清空所有本地记录吗？\n(建议先导出 CSV 进行备份)";

                if (window.confirm(confirmMsg)) {
                    // 如果已连接文件，尝试清空文件
                    if (isConnected && fileHandle) {
                        try {
                            const success = await writeToFile([]);
                            if (!success) {
                                if (!window.confirm("清空文件失败，是否仅清空屏幕显示的记录？")) {
                                    return;
                                }
                            }

                            console.error("清空文件出错", e);
                            alert("清空文件时出错");
                            return;
                        }

                }

                localStorage.setItem('cmc_history', JSON.stringify(newHistory));

                    await writeToFile(newHistory);
                }
                showMsg("记录已删除");

                                                                                        ? `L:${h.smplL_lch?.toFixed(2)} C:${h.smplC?.toFixed(2)} H:${h.smplH?.toFixed(1)}°`
                                                                                        : `L:${h.smplL?.toFixed(2)} a:${h.smplA?.toFixed(2)} b:${h.smplB?.toFixed(2)}`
                                                                                    }
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>

                                                                    {/* 分析结果 */}
                                                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3">分析</h4>
                                                                        <div className="space-y-3">
                                                                            <div className="flex justify-between items-center">
                                                                                <span className="text-slate-500 text-sm">容差:</span>
                                                                                <span className="font-mono font-medium text-slate-700">{h.tolerance?.toFixed(1) || 1.0}</span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center py-2 border-t border-slate-100">
                                                                                <span className="text-slate-500 text-sm">实际 ΔE:</span>
                                                                                <span className={`text-xl font-bold ${h.dE <= (h.tolerance || 1.0) ? 'text-emerald-600' : 'text-red-600'}`}>
                                                                                    {h.dE.toFixed(2)}
                                                                                </span>
                                                                            </div>
                                                                            <div className="flex justify-between items-center pt-1">
                                                                                <span className="text-slate-500 text-sm">判定:</span>
                                                                                <span className={`text-sm font-bold ${h.isPass ? 'text-emerald-600' : 'text-red-600'}`}>
                                                                                    {h.isPass !== undefined ? (h.isPass ? '✓ 合格' : '✗ 不合格') : '-'}
                                                                                </span>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </React.Fragment>
                                            );
                                        })}
                                        {historySearchTerm && filteredHistory.length === 0 ? (
                                            <tr>
                                                <td colSpan="7" className="px-6 py-16 text-center text-slate-400 bg-slate-50/30">
                                                    <p className="text-sm font-medium text-slate-500 mb-1">🔍 未找到匹配的记录</p>
                                                    <p className="text-xs text-slate-400">请尝试其他关键词</p>
                                                </td>
                                            </tr>
                                        ) : history.length === 0 && (
                                            <tr>
                                                <td colSpan="7" className="px-6 py-16 text-center text-slate-400 bg-slate-50/30">
                                                    <p className="text-sm font-medium text-slate-500 mb-1">{t('noRecords')}</p>
                                                    <p className="text-xs text-slate-400">开始测量后记录将显示在这里</p>
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* 弹出式标准选择器 */}
                    {showStandardSelector && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm p-4"
                            onClick={() => setShowStandardSelector(false)}
                        >
                            <div
                                className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col"
                                onClick={e => e.stopPropagation()}
                            >
                                {/* 头部 */}
                                <div className="p-6 border-b border-slate-100">
                                    <div className="flex items-center justify-between mb-4">
                                        <h2 className="text-lg font-bold text-slate-800">选择标准</h2>
                                        <button
                                            onClick={() => setShowStandardSelector(false)}
                                            className="text-slate-400 hover:text-slate-600 text-2xl leading-none"
                                        >
                                            ×
                                        </button>
                                    </div>
                                    {/* 搜索框 */}
                                    <div className="relative">
                                        <input
                                            type="text"
                                            value={standardSearchTerm}
                                            onChange={e => setStandardSearchTerm(e.target.value)}
                                            placeholder="搜索产品名称、颜色名称、国家、备注..."
                                            className="w-full px-4 py-3 pl-10 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                            autoFocus
                                        />
                                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-2">
                                        {standardSearchTerm
                                            ? `找到 ${standards.filter(s => { const term = standardSearchTerm.toLowerCase(); return (s.productName||'').toLowerCase().includes(term)||(s.colorName||'').toLowerCase().includes(term)||(s.country||'').toLowerCase().includes(term)||(s.note||'').toLowerCase().includes(term); }).length} / ${standards.length} 个标准`
                                            : `共 ${standards.length} 个标准 · 按 ESC 关闭`
                                        }
                                    </p>
                                </div>

                                {/* 标准列表 */}
                                <div className="flex-1 overflow-y-auto p-4">
                                    {standards.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <p className="text-lg mb-2">📂</p>
                                            <p>暂无保存的标准</p>
                                            <p className="text-sm mt-1">点击"保存"按钮添加第一个标准</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-3">
                                            {standards.filter(s => {
                                                if (!standardSearchTerm) return true;
                                                const term = standardSearchTerm.toLowerCase();
                                                return (
                                                    (s.productName || '').toLowerCase().includes(term) ||
                                                    (s.colorName || '').toLowerCase().includes(term) ||
                                                    (s.country || '').toLowerCase().includes(term) ||
                                                    (s.note || '').toLowerCase().includes(term)
                                                );
                                            }).map(s => (
                                                <div
                                                    key={s.id}
                                                    className="group border border-slate-200 rounded-xl p-4 hover:border-indigo-300 hover:bg-indigo-50/30 transition-all"
                                                >
                                                    <div className="flex items-start justify-between gap-4">
                                                        <div className="flex-1 min-w-0">
                                                            {/* 产品名称 - 颜色名称 */}
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="font-bold text-slate-800 truncate">
                                                                    {s.productName} - {s.colorName}
                                                                </span>
                                                                <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold ${s.mode === 'LAB' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                                    {s.mode}
                                                                </span>
                                                            </div>
                                                            {/* 国家标签 */}
                                                            {s.country && (
                                                                <span className="inline-block px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-xs mb-1">
                                                                    {s.country}
                                                                </span>
                                                            )}
                                                            {/* 备注信息 */}
                                                            {s.note && (
                                                                <p className="text-xs text-slate-500 truncate mt-1">
                                                                    📝 {s.note}
                                                                </p>
                                                            )}
                                                            {/* LAB/LCH 数值预览 */}
                                                            <div className="mt-2 text-[11px] font-mono text-slate-400 bg-slate-50 px-2 py-1 rounded inline-block">
                                                                L:{s.data.L.toFixed(2)} {s.mode==='LAB'?'a':'C'}:{s.mode==='LAB'?s.data.a:s.data.C} {s.mode==='LAB'?'b':'H'}:{s.mode==='LAB'?s.data.b:s.data.H}
                                                            </div>
                                                            {/* 容差值 */}
                                                            <div className="mt-1 text-xs text-slate-500">
                                                                ΔE ≤ {s.tolerance || 1.0}
                                                            </div>
                                                        </div>
                                                        {/* 操作按钮 */}
                                                        <div className="flex gap-2 flex-shrink-0">
                                                            <button
                                                                onClick={() => {
                                                                    loadStandard(s);
                                                                    setShowStandardSelector(false);
                                                                    setStandardSearchTerm('');
                                                                }}
                                                                className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold rounded-lg transition-all shadow-sm"
                                                            >
                                                                载入
                                                            </button>
                                                            <button
                                                                onClick={() => {
                                                                    if (confirm('确定要删除这条标准吗？')) {
                                                                        deleteStandard(s.id);
                                                                    }
                                                                }}
                                                                className="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-600 text-sm font-bold rounded-lg transition-all border border-red-200"
                                                                title="删除标准"
                                                            >
                                                                🗑️
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            {standards.filter(s => {
                                                if (!standardSearchTerm) return true;
                                                const term = standardSearchTerm.toLowerCase();
                                                return (
                                                    (s.productName || '').toLowerCase().includes(term) ||
                                                    (s.colorName || '').toLowerCase().includes(term) ||
                                                    (s.country || '').toLowerCase().includes(term) ||
                                                    (s.note || '').toLowerCase().includes(term)
                                                );
                                            }).length === 0 && (
                                                <div className="text-center py-8 text-slate-400">
                                                    <p>未找到匹配的标准</p>
                                                    <p className="text-sm mt-1">请尝试其他关键词</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {/* 底部提示 */}
                                <div className="p-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
                                    <p className="text-xs text-slate-500 text-center">
                                        按 ESC 或点击外部区域关闭 · 输入关键词实时过滤
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
